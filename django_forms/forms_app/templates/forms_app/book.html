<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>წიგნების ბიბლიოთეკა</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

    <div class="container" style="max-width: 800px;">
        
        <div class="card shadow-sm mb-5">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">ახალი წიგნის დამატება</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %} 
                    
                    {{ form.as_p }} 
                    
                    <button type="submit" class="btn btn-success w-100 mt-3">წიგნის შენახვა</button>
                </form>
            </div>
        </div>

        ---

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">წიგნების სია</h4>
            </div>
            <div class="card-body">
                {% if book %}
                    <ul class="list-group">
                        {% for b in book %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>{{ b.title }}</strong> - {{ b.author }}
                                </div>
                                <span class="badge bg-secondary rounded-pill">{{ b.writed_at }}</span>
                            </li>
                        {% endfor %}
                    </ul>
                {% else %}
                    <p class="text-muted text-center mb-0">ბაზაში წიგნები ჯერ არ არის.</p>
                {% endif %}
            </div>
        </div>

    </div>

</body>
</html>
